<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ZIP Unzip Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@600;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:       #080e1a;
    --surface:  #0d1625;
    --border:   #1a2840;
    --accent:   #4d9fff;
    --accent2:  #1a6fd4;
    --success:  #22c980;
    --warning:  #f0a832;
    --danger:   #f04f6a;
    --text:     #dce8ff;
    --muted:    #6a84aa;
    --mono:     'JetBrains Mono', monospace;
    --sans:     'Syne', sans-serif;
    --r:        10px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    min-height: 100vh;
    padding: 32px 24px 64px;
  }

  .shell { max-width: 1100px; margin: 0 auto; display: grid; gap: 24px; }

  .header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 16px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .header-left h1 {
    font-family: var(--sans);
    font-size: clamp(22px, 4vw, 36px);
    font-weight: 800;
    letter-spacing: -0.5px;
    color: #fff;
    line-height: 1;
  }
  .header-left p { color: var(--muted); margin-top: 6px; font-size: 12px; }
  .api-badge {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 99px;
    background: rgba(77,159,255,0.1);
    border: 1px solid rgba(77,159,255,0.25);
    color: var(--accent);
    white-space: nowrap;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r);
    overflow: hidden;
  }
  .card-head {
    padding: 18px 22px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .card-head h2 { font-family: var(--sans); font-size: 15px; font-weight: 600; color: #fff; }
  .card-body { padding: 22px; }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-group { display: grid; gap: 6px; }
  .form-group.full { grid-column: 1 / -1; }
  label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
  input[type=text] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 11px 13px;
    border-radius: 7px;
    font-family: var(--mono);
    font-size: 12px;
    outline: none;
    transition: border-color .15s;
  }
  input[type=text]:focus { border-color: var(--accent); }
  input::placeholder { color: #3a5070; }

  .checkbox-label {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 11px 13px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 7px;
    cursor: pointer;
    font-size: 12px;
    color: var(--text);
    user-select: none;
  }
  input[type=checkbox] { accent-color: var(--accent); width: 14px; height: 14px; }

  .form-actions { display: flex; align-items: center; gap: 12px; margin-top: 4px; }

  btn, .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    border: none;
    border-radius: 7px;
    padding: 10px 18px;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .15s, transform .1s;
  }
  .btn:hover { opacity: .85; transform: translateY(-1px); }
  .btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover { color: var(--text); }
  .btn-danger { background: transparent; color: #f08090; border: 1px solid rgba(240,80,106,.3); }

  .spinner {
    width: 14px; height: 14px;
    border: 2px solid rgba(0,0,0,.2);
    border-top-color: #000;
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .alert {
    padding: 11px 14px;
    border-radius: 7px;
    font-size: 12px;
    border: 1px solid;
    margin-top: 16px;
    display: none;
  }
  .alert.show { display: block; }
  .alert-success { background: rgba(34,201,128,.08); border-color: rgba(34,201,128,.3); color: #a0f0ce; }
  .alert-error   { background: rgba(240,79,106,.08); border-color: rgba(240,79,106,.3); color: #ffb0be; }

  .stats { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
  .stat {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    display: grid;
    gap: 6px;
  }
  .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; }
  .stat-value { font-family: var(--sans); font-size: 26px; font-weight: 800; color: #fff; }

  .toolbar { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .toolbar-search {
    flex: 1;
    min-width: 200px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 9px 13px;
    border-radius: 7px;
    font-family: var(--mono);
    font-size: 12px;
    outline: none;
  }
  .toolbar-search:focus { border-color: var(--accent); }

  .filter-group { display: flex; gap: 4px; }
  .filter-btn {
    padding: 7px 12px;
    font-family: var(--mono);
    font-size: 11px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all .15s;
  }
  .filter-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(77,159,255,.08); }

  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; min-width: 900px; }
  th {
    text-align: left;
    padding: 10px 16px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: .1em;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    background: rgba(255,255,255,.015);
    white-space: nowrap;
  }
  td {
    padding: 14px 16px;
    border-bottom: 1px solid rgba(26,40,64,.6);
    vertical-align: middle;
    font-size: 12px;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(77,159,255,.03); }
  .empty-row td { text-align: center; color: var(--muted); padding: 40px; }

  .pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 99px;
    font-size: 11px;
    font-weight: 600;
    border: 1px solid;
    text-transform: lowercase;
  }
  .pill-dot { width: 6px; height: 6px; border-radius: 50%; }
  .pill-queued    { color: #8bbfff; border-color: rgba(77,159,255,.3); background: rgba(77,159,255,.08); }
  .pill-queued    .pill-dot { background: #4d9fff; }
  .pill-running   { color: #ffd080; border-color: rgba(240,168,50,.3); background: rgba(240,168,50,.08); }
  .pill-running   .pill-dot { background: var(--warning); animation: pulse 1s infinite; }
  .pill-completed { color: #80f0c0; border-color: rgba(34,201,128,.3); background: rgba(34,201,128,.08); }
  .pill-completed .pill-dot { background: var(--success); }
  .pill-failed    { color: #ffb0be; border-color: rgba(240,79,106,.3); background: rgba(240,79,106,.08); }
  .pill-failed    .pill-dot { background: var(--danger); }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }

  .prog-wrap { width: 120px; height: 5px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .prog-bar  { height: 100%; background: var(--accent); border-radius: 99px; transition: width .4s; }

  .dim { color: var(--muted); font-size: 11px; }
  .mono { font-family: var(--mono); }

  .modal-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(4,8,18,.75);
    backdrop-filter: blur(4px);
    display: none;
    place-items: center;
    padding: 20px;
  }
  .modal-overlay.open { display: grid; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    width: min(860px, 100%);
    max-height: 85vh;
    overflow: auto;
    box-shadow: 0 30px 80px rgba(0,0,0,.5);
  }
  .modal-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 22px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--surface);
  }
  .modal-head h3 { font-family: var(--sans); font-size: 15px; font-weight: 600; color: #fff; }
  .modal-close {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 20px;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 4px;
    line-height: 1;
  }
  .modal-close:hover { color: var(--text); }
  .modal-body { padding: 22px; display: grid; gap: 12px; }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .detail-block {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
  }
  .detail-block.full { grid-column: 1 / -1; }
  .detail-key { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 6px; }
  .detail-val { font-size: 12px; word-break: break-all; }

  @media (max-width: 700px) {
    .form-row, .stats, .detail-grid { grid-template-columns: 1fr; }
    .form-group.full { grid-column: 1; }
    .detail-block.full { grid-column: 1; }
  }
</style>
</head>
<body>
<div class="shell">

  <header class="header">
    <div class="header-left">
      <h1>ZIP Unzip Portal</h1>
      <p>Azure Files · Durable Functions</p>
    </div>
    <span id="apiBadge" class="api-badge">connecting…</span>
  </header>

  <div class="card">
    <div class="card-head">
      <h2>Submit Job</h2>
    </div>
    <div class="card-body">
      <form id="jobForm">
        <div class="form-row">
          <div class="form-group full">
            <label>Source UNC — ZIP file path</label>
            <input type="text" id="sourceUnc" placeholder="\\storageaccount.file.core.windows.net\share\folder\archive.zip" required />
          </div>
          <div class="form-group full">
            <label>Destination UNC — output folder</label>
            <input type="text" id="destUnc" placeholder="\\storageaccount.file.core.windows.net\share\output-folder" required />
          </div>
          <div class="form-group">
            <label>ZIP Password (optional)</label>
            <input type="text" id="zipPassword" placeholder="Leave blank if no password" />
          </div>
          <div class="form-group">
            <label>&nbsp;</label>
            <label class="checkbox-label">
              <input type="checkbox" id="overwrite" checked />
              Overwrite existing files
            </label>
          </div>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary" id="submitBtn">
            <span id="submitSpinner" class="spinner" style="display:none"></span>
            Start Unzip
          </button>
        </div>
        <div class="alert" id="submitAlert"></div>
      </form>
    </div>
  </div>

  <div class="card">
    <div class="card-head" style="justify-content:space-between; flex-wrap:wrap; gap:12px;">
      <h2>Jobs</h2>
      <div class="toolbar">
        <input type="text" id="search" class="toolbar-search" placeholder="Search jobs…" />
        <div class="filter-group">
          <button class="filter-btn active" data-f="">All</button>
          <button class="filter-btn" data-f="queued">Queued</button>
          <button class="filter-btn" data-f="running">Running</button>
          <button class="filter-btn" data-f="completed">Done</button>
          <button class="filter-btn" data-f="failed">Failed</button>
        </div>
        <button class="btn btn-ghost" id="refreshBtn">Refresh</button>
        <button class="btn btn-danger" id="clearBtn">Clear finished</button>
      </div>
    </div>
    <div class="card-body" style="padding-bottom:0">
      <div class="stats" id="stats">
        <div class="stat"><div class="stat-label">Total</div><div class="stat-value" id="sTotal">0</div></div>
        <div class="stat"><div class="stat-label">Queued</div><div class="stat-value" id="sQueued">0</div></div>
        <div class="stat"><div class="stat-label">Running</div><div class="stat-value" id="sRunning">0</div></div>
        <div class="stat"><div class="stat-label">Done</div><div class="stat-value" id="sDone">0</div></div>
        <div class="stat"><div class="stat-label">Failed</div><div class="stat-value" id="sFailed">0</div></div>
      </div>
    </div>
    <div class="table-wrap" style="margin-top:16px">
      <table>
        <thead>
          <tr>
            <th>Instance ID</th>
            <th>Status</th>
            <th>Progress</th>
            <th>ZIP File</th>
            <th>Files</th>
            <th>Created</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="jobsBody">
          <tr class="empty-row"><td colspan="7">No jobs yet.</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-head">
      <h3 id="modalTitle">Job Details</h3>
      <button class="modal-close" id="modalClose">×</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
window.APP_CONFIG = window.APP_CONFIG || {
  apiBaseUrl: "https://test-unzip-a7fmdddddrendmg4.centralus-01.azurewebsites.net",
  refreshMs: 8000,
  storageKey: "unzip-portal-jobs-v2",
};

const state = { jobs: [], filter: "", search: "" };

const $ = id => document.getElementById(id);
const el = {
  form: $("jobForm"),
  source: $("sourceUnc"),
  dest: $("destUnc"),
  zipPassword: $("zipPassword"),
  overwrite: $("overwrite"),
  submitBtn: $("submitBtn"),
  submitSpinner: $("submitSpinner"),
  submitAlert: $("submitAlert"),
  jobsBody: $("jobsBody"),
  refreshBtn: $("refreshBtn"),
  clearBtn: $("clearBtn"),
  search: $("search"),
  apiBadge: $("apiBadge"),
  modalOverlay: $("modalOverlay"),
  modalClose: $("modalClose"),
  modalTitle: $("modalTitle"),
  modalBody: $("modalBody"),
  sTotal: $("sTotal"),
  sQueued: $("sQueued"),
  sRunning: $("sRunning"),
  sDone: $("sDone"),
  sFailed: $("sFailed"),
};

const cfg = window.APP_CONFIG;
const apiBaseUrl = String(cfg.apiBaseUrl || "").trim();
const isLive = /^https?:\/\//i.test(apiBaseUrl);

el.apiBadge.textContent = isLive ? "API connected" : "static / demo mode";
el.apiBadge.style.borderColor = isLive ? "rgba(34,201,128,.35)" : "rgba(240,168,50,.35)";
el.apiBadge.style.background  = isLive ? "rgba(34,201,128,.08)" : "rgba(240,168,50,.08)";
el.apiBadge.style.color       = isLive ? "#80f0c0" : "#ffd080";

function loadJobs() {
  try { return JSON.parse(localStorage.getItem(cfg.storageKey) || "[]"); }
  catch { return []; }
}
function saveJobs(jobs) {
  localStorage.setItem(cfg.storageKey, JSON.stringify(jobs));
}

function esc(s) {
  return String(s ?? "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}
function fmt(iso) {
  if (!iso) return "—";
  const d = new Date(iso);
  return isNaN(d) ? "—" : d.toLocaleString();
}
function basename(unc) {
  const parts = String(unc || "").replace(/\\/g,"/").split("/").filter(Boolean);
  return parts.at(-1) || "unknown.zip";
}
function normaliseStatus(runtimeStatus, output) {
  const rs = String(runtimeStatus || "").toLowerCase();

  if (rs === "pending") return "queued";
  if (rs === "running") return "running";
  if (rs === "completed") {
    const outStatus = String(output?.status || "").toLowerCase();
    if (outStatus.includes("error") || outStatus.includes("failed")) return "failed";
    return "completed";
  }
  return "failed";
}
function stageFromApi(api, saved) {
  const cs = api.customStatus || {};
  const out = api.output || {};
  return cs.stage || out.stage || saved.stage || "";
}
function progressFromApi(api, saved) {
  const cs = api.customStatus || {};
  if (typeof cs.progress === "number") return cs.progress;
  if (String(api.runtimeStatus || "").toLowerCase() === "completed") return 100;
  return saved.progress ?? 0;
}

async function apiFetch(path, opts = {}) {
  const url = apiBaseUrl.replace(/\/$/, "") + path;
  const res = await fetch(url, {
    headers: { "Content-Type": "application/json" },
    ...opts,
  });

  const text = await res.text();
  let data = {};
  try { data = text ? JSON.parse(text) : {}; } catch {}

  if (!res.ok) {
    throw new Error(data.error || data.message || `HTTP ${res.status}`);
  }
  return data;
}

async function refresh() {
  let jobs = loadJobs();

  if (isLive) {
    jobs = await Promise.all(jobs.map(async job => {
      if (["completed", "failed"].includes(job.status)) return job;
      try {
        const statusUrl = job.statusQueryGetUri || `${apiBaseUrl.replace(/\/$/, "")}/api/jobs/${job.id}`;
        const res = await fetch(statusUrl);
        const data = await res.json();
        return mergeApiData(job, data);
      } catch {
        return job;
      }
    }));
    saveJobs(jobs);
  } else {
    let changed = false;
    jobs = jobs.map(job => {
      if (job.status === "queued" && Date.now() - new Date(job.createdAt) > 3000) {
        changed = true;
        return { ...job, status: "running", progress: 10 };
      }
      if (job.status === "running") {
        changed = true;
        const p = Math.min(100, (job.progress || 10) + Math.floor(Math.random() * 20));
        if (p >= 100) {
          return { ...job, status: "completed", progress: 100, totalFiles: 42, uploaded: 42 };
        }
        return { ...job, progress: p };
      }
      return job;
    });
    if (changed) saveJobs(jobs);
  }

  state.jobs = jobs;
  render();
}

function mergeApiData(saved, api) {
  const cs = api.customStatus || {};
  const out = api.output || {};
  return {
    ...saved,
    runtimeStatus: api.runtimeStatus,
    status: normaliseStatus(api.runtimeStatus, out),
    progress: progressFromApi(api, saved),
    stage: stageFromApi(api, saved),
    totalFiles: out.totalFiles ?? cs.fileCount ?? saved.totalFiles ?? 0,
    uploaded: out.uploaded ?? saved.uploaded ?? 0,
    failed: out.failed ?? saved.failed ?? 0,
    lastUpdatedTime: api.lastUpdatedTime || saved.lastUpdatedTime,
    output: out || saved.output,
    customStatus: cs || saved.customStatus,
  };
}

el.form.addEventListener("submit", async e => {
  e.preventDefault();
  clearAlert();
  el.submitBtn.disabled = true;
  el.submitSpinner.style.display = "block";

  const source_unc = el.source.value.trim();
  const destination_unc = el.dest.value.trim();
  const zip_password = el.zipPassword.value.trim();
  const overwrite = el.overwrite.checked;

  try {
    if (!source_unc) throw new Error("Source UNC is required");
    if (!destination_unc) throw new Error("Destination UNC is required");

    let job;
    if (isLive) {
      const result = await apiFetch("/api/jobs", {
        method: "POST",
        body: JSON.stringify({
          source_unc,
          destination_unc,
          overwrite,
          zip_password: zip_password || null
        }),
      });

      job = {
        id: result.instanceId,
        statusQueryGetUri: result.statusQueryGetUri,
        terminatePostUri: result.terminatePostUri,
        source_unc,
        destination_unc,
        zipFile: basename(source_unc),
        status: "queued",
        runtimeStatus: "Pending",
        progress: 0,
        totalFiles: 0,
        uploaded: 0,
        failed: 0,
        createdAt: new Date().toISOString(),
      };
    } else {
      job = {
        id: crypto.randomUUID(),
        source_unc,
        destination_unc,
        zipFile: basename(source_unc),
        status: "queued",
        progress: 0,
        totalFiles: 0,
        uploaded: 0,
        failed: 0,
        createdAt: new Date().toISOString(),
      };
    }

    const jobs = loadJobs();
    jobs.unshift(job);
    saveJobs(jobs);
    el.form.reset();
    el.overwrite.checked = true;
    showAlert("Job submitted successfully.", "success");
    await refresh();
  } catch (err) {
    showAlert(err.message || "Failed to submit job.", "error");
  } finally {
    el.submitBtn.disabled = false;
    el.submitSpinner.style.display = "none";
  }
});

function render() {
  const q = state.search.trim().toLowerCase();
  const filtered = state.jobs.filter(job => {
    const statusOk = !state.filter || job.status === state.filter;
    const searchOk = !q || [job.id, job.zipFile, job.source_unc, job.destination_unc, job.status].join(" ").toLowerCase().includes(q);
    return statusOk && searchOk;
  });

  const counts = { queued: 0, running: 0, completed: 0, failed: 0 };
  state.jobs.forEach(job => {
    if (counts[job.status] !== undefined) counts[job.status]++;
  });

  el.sTotal.textContent = state.jobs.length;
  el.sQueued.textContent = counts.queued;
  el.sRunning.textContent = counts.running;
  el.sDone.textContent = counts.completed;
  el.sFailed.textContent = counts.failed;

  if (!filtered.length) {
    el.jobsBody.innerHTML = `<tr class="empty-row"><td colspan="7">${state.jobs.length ? "No jobs match the filter." : "No jobs yet."}</td></tr>`;
    return;
  }

  el.jobsBody.innerHTML = filtered.map(job => {
    const p = Math.max(0, Math.min(100, Number(job.progress || 0)));
    const statusClass = `pill-${job.status || "queued"}`;
    return `<tr>
      <td><div class="mono dim" style="font-size:11px">${esc(job.id)}</div></td>
      <td><span class="pill ${statusClass}"><span class="pill-dot"></span>${esc(job.status)}</span></td>
      <td>
        <div class="prog-wrap"><div class="prog-bar" style="width:${p}%"></div></div>
        <div class="dim" style="margin-top:4px">${p}%${job.stage ? ` · ${esc(job.stage)}` : ""}</div>
      </td>
      <td>
        <div>${esc(job.zipFile || basename(job.source_unc))}</div>
        <div class="dim">${esc(job.destination_unc || "")}</div>
      </td>
      <td>
        <div>${job.uploaded ?? 0} uploaded</div>
        ${job.failed ? `<div class="dim" style="color:#f08090">${job.failed} failed</div>` : ""}
      </td>
      <td><div class="dim">${fmt(job.createdAt)}</div></td>
      <td><button class="btn btn-ghost" style="padding:6px 12px;font-size:11px" onclick="openModal('${esc(job.id)}')">Details</button></td>
    </tr>`;
  }).join("");
}

function openModal(id) {
  const job = state.jobs.find(j => j.id === id);
  if (!job) return;

  el.modalTitle.textContent = `Job · ${job.id.slice(0, 12)}…`;
  const cs = job.customStatus || {};
  const out = job.output || {};

  el.modalBody.innerHTML = `
    <div class="detail-grid">
      <div class="detail-block">
        <div class="detail-key">Status</div>
        <div class="detail-val"><span class="pill pill-${job.status}"><span class="pill-dot"></span>${esc(job.status)}</span></div>
      </div>
      <div class="detail-block">
        <div class="detail-key">Runtime status</div>
        <div class="detail-val">${esc(job.runtimeStatus || "—")}</div>
      </div>
      <div class="detail-block full">
        <div class="detail-key">Instance ID</div>
        <div class="detail-val mono">${esc(job.id)}</div>
      </div>
      <div class="detail-block full">
        <div class="detail-key">Source UNC</div>
        <div class="detail-val mono">${esc(job.source_unc || "—")}</div>
      </div>
      <div class="detail-block full">
        <div class="detail-key">Destination UNC</div>
        <div class="detail-val mono">${esc(job.destination_unc || "—")}</div>
      </div>
      <div class="detail-block">
        <div class="detail-key">Created</div>
        <div class="detail-val">${fmt(job.createdAt)}</div>
      </div>
      <div class="detail-block">
        <div class="detail-key">Last updated</div>
        <div class="detail-val">${fmt(job.lastUpdatedTime)}</div>
      </div>
      <div class="detail-block">
        <div class="detail-key">Progress</div>
        <div class="detail-val">${job.progress ?? 0}% · stage: ${esc(job.stage || cs.stage || "—")}</div>
      </div>
      <div class="detail-block">
        <div class="detail-key">Files</div>
        <div class="detail-val">${job.uploaded ?? 0} uploaded · ${job.failed ?? 0} failed · ${job.totalFiles ?? 0} total</div>
      </div>
      ${out.status ? `<div class="detail-block"><div class="detail-key">Output status</div><div class="detail-val">${esc(out.status)}</div></div>` : ""}
      ${out.message ? `<div class="detail-block"><div class="detail-key">Output message</div><div class="detail-val">${esc(out.message)}</div></div>` : ""}
      ${out.failures?.length ? `<div class="detail-block full"><div class="detail-key">Failures (first ${Math.min(out.failures.length, 10)})</div><div class="detail-val mono dim">${out.failures.slice(0,10).map(f => esc(f.path + ": " + f.error)).join("<br>")}</div></div>` : ""}
    </div>`;
  el.modalOverlay.classList.add("open");
}

function closeModal() {
  el.modalOverlay.classList.remove("open");
}

el.modalClose.addEventListener("click", closeModal);
el.modalOverlay.addEventListener("click", e => {
  if (e.target === el.modalOverlay) closeModal();
});
document.addEventListener("keydown", e => {
  if (e.key === "Escape") closeModal();
});

el.refreshBtn.addEventListener("click", refresh);
el.clearBtn.addEventListener("click", () => {
  saveJobs(loadJobs().filter(j => !["completed", "failed"].includes(j.status)));
  refresh();
});
el.search.addEventListener("input", e => {
  state.search = e.target.value;
  render();
});
document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    state.filter = btn.dataset.f;
    render();
  });
});

function showAlert(msg, type) {
  el.submitAlert.textContent = msg;
  el.submitAlert.className = `alert alert-${type} show`;
}
function clearAlert() {
  el.submitAlert.className = "alert";
  el.submitAlert.textContent = "";
}

refresh();
setInterval(refresh, cfg.refreshMs || 8000);
</script>
</body>
</html>
