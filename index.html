<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Azure ZIP Extractor</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <section class="card">
      <div class="header-row">
        <div>
          <h1>Azure ZIP Extractor</h1>
          <p class="subtitle">Pick a ZIP file from Azure Files and extract it to another folder.</p>
        </div>
        <button id="refreshButton" class="secondary">Refresh</button>
      </div>

      <div class="grid">
        <label>
          <span>Source directory</span>
          <input id="sourceDirectory" type="text" value="incoming" placeholder="incoming" />
        </label>

        <label>
          <span>Destination root directory</span>
          <input id="destinationDirectory" type="text" value="extracted" placeholder="extracted" />
        </label>
      </div>

      <div class="actions">
        <button id="loadFilesButton">Load ZIP files</button>
      </div>

      <div id="message" class="message hidden"></div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th></th>
              <th>ZIP file</th>
              <th>Path</th>
              <th>Size</th>
              <th>Last modified</th>
            </tr>
          </thead>
          <tbody id="filesTableBody">
            <tr>
              <td colspan="5" class="empty">Load ZIP files to begin.</td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="divider"></div>

      <form id="extractForm">
        <div class="grid">
          <label>
            <span>Selected ZIP</span>
            <input id="selectedZipPath" type="text" readonly />
          </label>

          <label>
            <span>Output folder name</span>
            <input id="outputFolderName" type="text" placeholder="batch-001" />
          </label>
        </div>

        <div class="actions">
          <button id="extractButton" type="submit">Extract ZIP</button>
        </div>
      </form>

      <section class="results">
        <h2>Latest result</h2>
        <pre id="resultPanel">No extraction has been run yet.</pre>
      </section>
    </section>
  </main>

  <script src="app-config.js"></script>
  <script src="app.js"></script>
</body>
</html>
